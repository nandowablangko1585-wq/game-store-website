  <main class="container" style="padding-top:100px;">
    <h1 class="mb-3">Keranjang Belanja</h1>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
  <script src="games.js"></script>
  <script src="utils.js"></script>
  <script src="main.js"></script>
  <script>
    // Render cart from localStorage
    function renderCart() {
      const container = document.getElementById('cartItems');
      const cart = loadFromLocalStorage('cart') || [];

      if (!container) return;

      if (!cart.length) {
        container.innerHTML = '<div class="p-4 text-center text-secondary">Keranjang Anda kosong. Tambahkan game dari halaman Store.</div>';
        updateCartCount();
        return;
      }

      const totalPrice = cart.reduce((sum, it) => sum + (it.price * (it.quantity || 1)), 0);

      container.innerHTML = `
        <div class="list-group mb-3">
          ${cart.map(item => `
            <div class="list-group-item d-flex align-items-center" data-id="${item.id}">
              <img src="${item.image}" alt="${item.title}" style="width:72px; height:72px; object-fit:cover; border-radius:6px; margin-right:12px;">
              <div class="flex-grow-1">
                <div class="fw-bold">${item.title}</div>
                <div class="text-secondary small">Rp ${item.price.toLocaleString('id-ID')}</div>
              </div>
              <div class="d-flex align-items-center gap-2">
                <button class="btn btn-sm btn-outline-gamestore cart-decrease" data-id="${item.id}">-</button>
                <div class="px-2">${item.quantity || 1}</div>
                <button class="btn btn-sm btn-outline-gamestore cart-increase" data-id="${item.id}">+</button>
                <button class="btn btn-sm btn-outline-gamestore ms-2 cart-remove" data-id="${item.id}"><i class="fas fa-trash"></i></button>
              </div>
            </div>
          `).join('')}
        </div>
        <div class="d-flex justify-content-between align-items-center">
          <div class="fw-bold">Total:</div>
          <div class="fw-bold">Rp ${totalPrice.toLocaleString('id-ID')}</div>
        </div>
        <div class="mt-3 text-end">
          <button class="btn btn-primary-gamestore" id="checkoutBtn">Lanjut ke Checkout</button>
        </div>
      `;

      updateCartCount();
    }

    document.addEventListener('click', function(e) {
      const rem = e.target.closest('.cart-remove');
      if (rem) {
        const id = parseInt(rem.dataset.id, 10);
        if (!isNaN(id)) {
          let cart = loadFromLocalStorage('cart') || [];
          cart = cart.filter(i => i.id !== id);
          saveToLocalStorage('cart', cart);
          showAlert('Item dihapus dari Cart', 'info');
          renderCart();
        }
        return;
      }

      const inc = e.target.closest('.cart-increase');
      if (inc) {
        const id = parseInt(inc.dataset.id, 10);
        if (!isNaN(id)) {
          const cart = loadFromLocalStorage('cart') || [];
          const it = cart.find(i => i.id === id);
          if (it) {
            it.quantity = (it.quantity || 1) + 1;
            saveToLocalStorage('cart', cart);
            renderCart();
          }
        }
        return;
      }

      const dec = e.target.closest('.cart-decrease');
      if (dec) {
        const id = parseInt(dec.dataset.id, 10);
        if (!isNaN(id)) {
          const cart = loadFromLocalStorage('cart') || [];
          const it = cart.find(i => i.id === id);
          if (it) {
            it.quantity = (it.quantity || 1) - 1;
            if (it.quantity <= 0) {
              const newCart = cart.filter(i => i.id !== id);
              saveToLocalStorage('cart', newCart);
            } else {
              saveToLocalStorage('cart', cart);
            }
            renderCart();
          }
        }
        return;
      }

      const checkout = e.target.closest('#checkoutBtn');
      if (checkout) {
        // Build and show a checkout modal with a QRIS placeholder image
        const cart = loadFromLocalStorage('cart') || [];
        const totalPrice = cart.reduce((sum, it) => sum + (it.price * (it.quantity || 1)), 0);

        const modalId = 'checkoutModal';
        let modal = document.getElementById(modalId);
        if (!modal) {
          modal = document.createElement('div');
          modal.className = 'modal fade';
          modal.id = modalId;
          modal.innerHTML = `
            <div class="modal-dialog modal-md modal-dialog-centered">
              <div class="modal-content">
                <div class="modal-header">
                  <h5 class="modal-title">Checkout — Pembayaran</h5>
                  <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body text-center">
                  <p class="mb-2">Total yang harus dibayar:</p>
                  <h4 class="mb-3">Rp ${totalPrice.toLocaleString('id-ID')}</h4>
                  <p class="text-secondary">Pilih metode pembayaran: <strong>QRIS</strong></p>
                  <div class="mb-3">
                    <!-- Inline SVG placeholder for QRIS so user can replace the src later -->
                    <img id="qrisImage" src="bahan/qrcode.jpg" alt="QRIS" style="max-width:260px; width:100%; height:auto; border:1px solid #e9e9e9;">
                  </div>
                  <p class="small text-secondary">Scan QR di atas dengan aplikasi pembayaran Anda, lalu tekan "Saya sudah bayar" setelah melakukan transfer.</p>
                </div>
                <div class="modal-footer">
                  <button type="button" class="btn btn-outline-gamestore" data-bs-dismiss="modal">Batal</button>
                  <button type="button" class="btn btn-primary-gamestore" id="confirmPaymentBtn">Saya sudah bayar</button>
                </div>
              </div>
            </div>
          `;
          document.body.appendChild(modal);
        } else {
          // update total if modal already exists
          modal.querySelector('.modal-body h4').textContent = `Rp ${totalPrice.toLocaleString('id-ID')}`;
        }

        const bsModal = new bootstrap.Modal(modal);
        bsModal.show();

        // wire confirm button
        const confirmBtn = modal.querySelector('#confirmPaymentBtn');
        confirmBtn.onclick = function() {
          // Clear cart and update
          saveToLocalStorage('cart', []);
          updateCartCount();
          renderCart();
          bsModal.hide();
          const success = createSuccessModal('Pembayaran Diterima', 'Terima kasih! Pembayaran Anda telah dicatat. Pesanan akan diproses.');
          new bootstrap.Modal(success).show();
        };

        return;
      }
    });

    document.addEventListener('DOMContentLoaded', function() {
      renderCart();
    });
  </script>
