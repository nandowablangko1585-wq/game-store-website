<!DOCTYPE html>

<head>
  <meta charset="UTF-8">

  <link rel="stylesheet" href="style.css">
</head>
<body>

      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarMain">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="navbarMain">
        <ul class="navbar-nav me-auto mb-2 mb-lg-0">
          <li class="nav-item"><a class="nav-link" href="index.html"><i class="fas fa-home me-1"></i> Home</a></li>
          <li class="nav-item"><a class="nav-link" href="store.html"><i class="fas fa-store me-1"></i> Store</a></li>
          <li class="nav-item"><a class="nav-link" href="categories.html"><i class="fas fa-tags me-1"></i> Categories</a></li>
          <li class="nav-item"><a class="nav-link" href="promo.html"><i class="fas fa-percent me-1"></i> Promo</a></li>
          <li class="nav-item"><a class="nav-link" href="news.html"><i class="fas fa-newspaper me-1"></i> News</a></li>

        <div class="nav-search dropdown ms-3">
          <button class="btn btn-outline-gamestore dropdown-toggle" id="navSearchToggle" data-bs-toggle="dropdown" aria-expanded="false">
            <i class="fas fa-search"></i>
          </button>
          <div class="dropdown-menu dropdown-menu-end p-3">
            <form class="d-flex" id="navSearchForm" onsubmit="return false;">
              <input class="form-control form-control-gamestore me-2" type="search" placeholder="Search games..." id="searchInput">
              <button class="btn btn-primary-gamestore" type="button" id="searchBtn"><i class="fas fa-search"></i></button>
            </form>
          </div>
        </div>

  <main class="container mt-5 pt-4">
    <h2 class="section-title">Wishlist Anda</h2>
    <p class="text-secondary">Daftar game yang telah Anda tandai akan muncul di sini.</p>
    <div id="wishlistContainer" class="row g-3 mt-3">
      <div class="col-12 text-center text-secondary">Wishlist kosong. Tambahkan game dari halaman Store.</div>
    </div>
  </main>

  <footer class="footer-gamestore mt-5">
    <div class="container">
      <div class="border-top pt-3 mt-4 text-center">
  <p class="text-secondary mb-0">&copy; 2026 CoreIIGether. All rights reserved.</p>
      </div>
    </div>
  </footer>
  <!-- floating music control removed from this page (centralized in index.html) -->

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
  <script src="games.js"></script>
  <script src="utils.js"></script>
  <script src="main.js"></script>
  <script>
    // Render wishlist from localStorage
    function renderWishlist() {
      const container = document.getElementById('wishlistContainer');
      const wishlist = loadFromLocalStorage('wishlist') || [];

      if (!container) return;

      if (!wishlist.length) {
        container.innerHTML = '<div class="col-12 text-center text-secondary">Wishlist kosong. Tambahkan game dari halaman Store.</div>';
        return;
      }

      container.innerHTML = wishlist.map(item => `
        <div class="col-md-6 col-lg-4">
          <div class="card card-body wishlist-card d-flex flex-row gap-3 align-items-center">
            <img src="${item.image}" alt="${item.title}" style="width:72px; height:72px; object-fit:cover; border-radius:6px;">
            <div class="flex-grow-1">
              <div class="fw-bold">${item.title}</div>
              <div class="text-secondary small">Rp ${item.price.toLocaleString('id-ID')}${item.discount ? ` • -${item.discount}%` : ''}</div>
            </div>
            <div class="d-flex flex-column align-items-end">
              <button class="btn btn-sm btn-primary-gamestore mb-2 wishlist-add-cart" data-game-id="${item.id}">Pindah ke Cart</button>
              <button class="btn btn-sm btn-outline-gamestore wishlist-remove" data-game-id="${item.id}"><i class="fas fa-trash"></i></button>
            </div>
          </div>
        </div>
      `).join('');
    }

    // Delegated click handlers for wishlist actions
    document.addEventListener('click', function (e) {
      const addBtn = e.target.closest('.wishlist-add-cart');
      if (addBtn) {
        const id = parseInt(addBtn.dataset.gameId, 10);
        if (!isNaN(id)) {
          addToCart(id);
          // remove from wishlist
          const wl = loadFromLocalStorage('wishlist') || [];
          const newWl = wl.filter(i => i.id !== id);
          saveToLocalStorage('wishlist', newWl);
          showAlert('Item dipindahkan ke Cart', 'success');
          renderWishlist();
        }
        return;
      }

      const remBtn = e.target.closest('.wishlist-remove');
      if (remBtn) {
        const id = parseInt(remBtn.dataset.gameId, 10);
        if (!isNaN(id)) {
          const wl = loadFromLocalStorage('wishlist') || [];
          const newWl = wl.filter(i => i.id !== id);
          saveToLocalStorage('wishlist', newWl);
          showAlert('Item dihapus dari Wishlist', 'info');
          renderWishlist();
        }
        return;
      }
    });

    // Initial render
    document.addEventListener('DOMContentLoaded', function() {
      renderWishlist();
    });
  </script>
  </script>
    <!-- Floating music control (restored) -->
    <div class="floating-music" aria-hidden="false">
      <button id="floatingMusicBtn" title="Play / Pause background music"><i class="fas fa-play"></i></button>
      <div class="floating-label">Background Music</div>
    </div>
  </body>
  </html>
</html>
